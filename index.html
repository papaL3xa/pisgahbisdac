            if (!dateString) return '';
            const d = new Date(dateString + 'T00:00:00');
            if (isNaN(d.getTime())) return dateString;
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        };

            if (!dateString) return '';

            if (isNaN(d.getTime())) return dateString;
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];

            return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

        const formatDate = (dateString) => {

            // Data users (disimpan di localStorage)
            const [users, setUsers] = React.useState([]);

            // Load users dari localStorage
            React.useEffect(() => {
                const savedUsers = localStorage.getItem('pisgah_users');
                if (savedUsers) {
                    setUsers(JSON.parse(savedUsers));
                } else {
                    // Default user: admin
                    setUsers([{ username: 'admin', password: 'admin123', role: 'admin' }]);
                    localStorage.setItem('pisgah_users', JSON.stringify([{ username: 'admin', password: 'admin123', role: 'admin' }]));
                }
                
                // Load data dari Google Apps Script
                fetch(`${GAS_API_URL}?action=getData`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.dataPejabat) setDataPejabat(data.dataPejabat);
                        if (data.jadwalDB) setJadwalDB(data.jadwalDB);
                        if (data.youtubeUrl) setYoutubeUrl(data.youtubeUrl);
                        if (data.kategoriPejabat) setKategoriPejabat(data.kategoriPejabat);
                        setIsAppLoading(false);
                    })
                    .catch(error => {
                        console.error('Error fetching data:', error);
                        setIsAppLoading(false);
                    });
            }, []);

            const [showLoginModal, setShowLoginModal] = React.useState(false);

            const handleLoginSuccess = (username, password) => {
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    setAdminToken(password);
                    setUserRole(user.role);
                    setIsLoggedIn(true);
                    setShowLoginModal(false);
                    setActiveTab('admin_dashboard');
                } else {
                    alert('Username atau password salah!');
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setUserRole('');
                setAdminToken('');
                setActiveTab('home');
            };

            // ========================================================
            // KOMPONEN LOGIN MODAL
            // ========================================================
            const LoginModal = ({ isOpen, onClose, onSuccess }) => {
                const [username, setUsername] = React.useState('');
                const [password, setPassword] = React.useState('');
                const [showPass, setShowPass] = React.useState(false);
                
                if (!isOpen) return null;
                
                const handleSubmit = (e) => {
                    e.preventDefault();
                    onSuccess(username, password);
                };
                
                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-navy-900/60 px-4 backdrop-blur-md animate-fade-in">
                        <div className="bg-white rounded-[1.5rem] shadow-2xl p-6 md:p-8 max-w-sm w-full relative border border-navy-100/60">
                            <button onClick={onClose} className="absolute top-4 right-4 text-navy-400 hover:text-red-500 transition-colors bg-navy-50 w-8 h-8 rounded-full flex items-center justify-center font-bold pb-1">&times;</button>
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 bg-navy-50 rounded-full flex items-center justify-center text-gold-500 shadow-inner">
                                    <Icon name="Users" className="w-8 h-8" />
                                </div>
                            </div>
                            <h2 className="text-2xl font-black text-center text-navy-900 mb-2 tracking-tight">Login</h2>
                            <p className="text-sm text-center text-navy-500 mb-8 font-medium">Masuk sebagai Admin atau Editor</p>
                            <form onSubmit={handleSubmit}>
                                <div className="mb-4">
                                    <label className="block text-xs font-bold text-navy-700 mb-2 uppercase tracking-widest">Username</label>
                                    <input 
                                        type="text" 
                                        value={username} 
                                        onChange={e => setUsername(e.target.value)} 
                                        autoFocus 
                                        className="w-full p-3.5 border-2 border-navy-100 bg-navy-50/50 rounded-xl focus:border-gold-500 outline-none font-medium shadow-sm" 
                                        required 
                                    />
                                </div>
                                <div className="mb-6">
                                    <label className="block text-xs font-bold text-navy-700 mb-2 uppercase tracking-widest">Kata Sandi</label>
                                    <div className="relative">
                                        <input 
                                            type={showPass ? "text" : "password"} 
                                            value={password} 
                                            onChange={e => setPassword(e.target.value)} 
                                            className="w-full p-3.5 pr-10 border-2 border-navy-100 bg-navy-50/50 rounded-xl focus:border-gold-500 outline-none font-medium shadow-sm" 
                                            required 
                                        />
                                        <button 
                                            type="button" 
                                            onClick={() => setShowPass(!showPass)} 
                                            className="absolute right-3.5 top-1/2 -translate-y-1/2 text-navy-400 hover:text-gold-500"
                                        >
                                            <Icon name={showPass ? "EyeOff" : "Eye"} className="w-5 h-5" />
                                        </button>
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-navy-900 hover:bg-navy-800 text-gold-400 font-bold py-3.5 rounded-xl transition-all shadow-md">
                                    Masuk
                                </button>
                            </form>
                        </div>
                    </div>
                );
            };

            // ========================================================
            // KOMPONEN ADMIN DASHBOARD (dengan Manajemen User)
            // ========================================================
            const AdminDashboard = ({ userRole, users, setUsers }) => {
                const [adminTab, setAdminTab] = React.useState('jadwal');
                const [newUsername, setNewUsername] = React.useState('');
                const [newPassword, setNewPassword] = React.useState('');
                const [newRole, setNewRole] = React.useState('editor');
                const [editUserId, setEditUserId] = React.useState(null);
                const [editUsername, setEditUsername] = React.useState('');
                const [editPassword, setEditPassword] = React.useState('');
                const [editUserRole, setEditUserRole] = React.useState('editor');

                const handleAddUser = () => {
                    if (!newUsername || !newPassword) {
                        alert('Isi username dan password!');
                        return;
                    }
                    if (users.find(u => u.username === newUsername)) {
                        alert('Username sudah ada!');
                        return;
                    }
                    const newUsers = [...users, { username: newUsername, password: newPassword, role: newRole }];
                    setUsers(newUsers);
                    localStorage.setItem('pisgah_users', JSON.stringify(newUsers));
                    setNewUsername('');
                    setNewPassword('');
                    setNewRole('editor');
                    alert('User berhasil ditambahkan!');
                };

                const handleUpdateUser = (id) => {
                    if (!editUsername) {
                        alert('Username tidak boleh kosong!');
                        return;
                    }
                    const updatedUsers = users.map((u, idx) => 
                        idx === id ? { ...u, username: editUsername, password: editPassword || u.password, role: editUserRole } : u
                    );
                    setUsers(updatedUsers);
                    localStorage.setItem('pisgah_users', JSON.stringify(updatedUsers));
                    setEditUserId(null);
                    alert('User berhasil diperbarui!');
                };

                const handleDeleteUser = (id) => {
                    const targetUser = users[id];
                    if (targetUser.role === 'admin') {
                        alert('Tidak dapat menghapus admin utama!');
                        return;
                    }
                    if (window.confirm(`Hapus user "${targetUser.username}"?`)) {
                        const newUsers = users.filter((_, i) => i !== id);
                        setUsers(newUsers);
                        localStorage.setItem('pisgah_users', JSON.stringify(newUsers));
                        alert('User berhasil dihapus!');
                    }
                };

                return (
                    <div className="space-y-6">
                        <div className="bg-white rounded-[1.5rem] shadow-sm border border-navy-100/60 overflow-hidden">
                            <div className="flex flex-col sm:flex-row border-b border-navy-50 bg-navy-50/20">
                                <button 
                                    onClick={() => setAdminTab('jadwal')} 
                                    className={`flex-1 py-4 font-bold text-sm md:text-base transition-colors ${adminTab === 'jadwal' ? 'bg-navy-900 text-gold-400' : 'text-navy-600 hover:bg-navy-50'}`}
                                >
                                    Kelola Jadwal
                                </button>
                                <button 
                                    onClick={() => setAdminTab('pelayan')} 
                                    className={`flex-1 py-4 font-bold text-sm md:text-base transition-colors ${adminTab === 'pelayan' ? 'bg-navy-900 text-gold-400' : 'text-navy-600 hover:bg-navy-50'}`}
                                >
                                    Kelola Pejabat
                                </button>
                                {userRole === 'admin' && (
                                    <button 
                                        onClick={() => setAdminTab('users')} 
                                        className={`flex-1 py-4 font-bold text-sm md:text-base transition-colors ${adminTab === 'users' ? 'bg-navy-900 text-gold-400' : 'text-navy-600 hover:bg-navy-50'}`}
                                    >
                                        Manajemen User
                                    </button>
                                )}
                                <button 
                                    onClick={() => setAdminTab('pengaturan')} 
                                    className={`flex-1 py-4 font-bold text-sm md:text-base transition-colors ${adminTab === 'pengaturan' ? 'bg-navy-900 text-gold-400' : 'text-navy-600 hover:bg-navy-50'}`}
                                >
                                    Pengaturan
                                </button>
                            </div>
                            
                            <div className="p-6">
                                {adminTab === 'jadwal' && (
                                    <div className="text-center py-8 text-navy-600">
                                        <Icon name="Calendar" className="w-12 h-12 mx-auto text-gold-400 mb-3" />
                                        <p className="font-medium">Halaman kelola jadwal ibadah (Akses untuk Admin & Editor)</p>
                                        <p className="text-sm text-navy-400 mt-2">Fitur ini memungkinkan Anda mengedit jadwal petugas ibadah Rabu dan Sabat.</p>
                                    </div>
                                )}
                                
                                {adminTab === 'pelayan' && (
                                    <div className="text-center py-8 text-navy-600">
                                        <Icon name="Users" className="w-12 h-12 mx-auto text-gold-400 mb-3" />
                                        <p className="font-medium">Halaman kelola data pejabat jemaat (Akses untuk Admin & Editor)</p>
                                        <p className="text-sm text-navy-400 mt-2">Kelola data kontak, jabatan, dan foto pelayan jemaat.</p>
                                    </div>
                                )}
                                
                                {adminTab === 'users' && userRole === 'admin' && (
                                    <div>
                                        <h3 className="font-black text-lg text-navy-900 mb-4 flex items-center">
                                            <Icon name="Settings" className="w-5 h-5 mr-2 text-gold-500" />
                                            Manajemen User (Editor)
                                        </h3>
                                        <p className="text-sm text-navy-600 mb-6">Kelola akun user yang dapat mengakses dashboard. Hanya Admin yang dapat mengelola user.</p>
                                        
                                        {/* Form Tambah User */}
                                        <div className="bg-gold-50/50 border border-gold-200 rounded-xl p-5 mb-8">
                                            <h4 className="font-bold text-navy-800 mb-4">Tambah User Baru</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <input 
                                                    type="text" 
                                                    placeholder="Username" 
                                                    value={newUsername} 
                                                    onChange={e => setNewUsername(e.target.value)} 
                                                    className="p-3 border border-navy-200 rounded-xl focus:border-gold-500 outline-none"
                                                />
                                                <input 
                                                    type="text" 
                                                    placeholder="Password" 
                                                    value={newPassword} 
                                                    onChange={e => setNewPassword(e.target.value)} 
                                                    className="p-3 border border-navy-200 rounded-xl focus:border-gold-500 outline-none"
                                                />
                                                <select 
                                                    value={newRole} 
                                                    onChange={e => setNewRole(e.target.value)} 
                                                    className="p-3 border border-navy-200 rounded-xl focus:border-gold-500 outline-none bg-white"
                                                >
                                                    <option value="editor">Editor</option>
                                                    <option value="admin">Admin</option>
                                                </select>
                                            </div>
                                            <button 
                                                onClick={handleAddUser} 
                                                className="mt-4 bg-navy-900 hover:bg-navy-800 text-gold-400 px-6 py-2.5 rounded-xl font-bold transition shadow-sm"
                                            >
                                                + Tambah User
                                            </button>
                                        </div>
                                        
                                        {/* Daftar User */}
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm border border-navy-100 rounded-xl overflow-hidden">
                                                <thead className="bg-navy-50">
                                                    <tr>
                                                        <th className="p-3 text-left font-bold text-navy-700">Username</th>
                                                        <th className="p-3 text-left font-bold text-navy-700">Role</th>
                                                        <th className="p-3 text-left font-bold text-navy-700">Aksi</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {users.map((user, idx) => (
                                                        <tr key={idx} className="border-t border-navy-100">
                                                            {editUserId === idx ? (
                                                                <>
                                                                    <td className="p-3">
                                                                        <input 
                                                                            value={editUsername} 
                                                                            onChange={e => setEditUsername(e.target.value)} 
                                                                            className="border border-navy-200 p-2 rounded-lg w-full"
                                                                        />
                                                                    </td>
                                                                    <td className="p-3">
                                                                        <select 
                                                                            value={editUserRole} 
                                                                            onChange={e => setEditUserRole(e.target.value)} 
                                                                            className="border border-navy-200 p-2 rounded-lg bg-white"
                                                                        >
                                                                            <option value="editor">Editor</option>
                                                                            <option value="admin">Admin</option>
                                                                        </select>
                                                                    </td>
                                                                    <td className="p-3">
                                                                        <button onClick={() => handleUpdateUser(idx)} className="text-green-600 hover:text-green-800 mr-3 font-medium">Simpan</button>
                                                                        <button onClick={() => setEditUserId(null)} className="text-gray-500 hover:text-gray-700">Batal</button>
                                                                    </td>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <td className="p-3 font-medium text-navy-800">{user.username}</td>
                                                                    <td className="p-3">
                                                                        <span className={`px-2 py-1 rounded-full text-xs font-bold ${user.role === 'admin' ? 'bg-gold-100 text-gold-700' : 'bg-navy-100 text-navy-600'}`}>
                                                                            {user.role === 'admin' ? 'Admin' : 'Editor'}
                                                                        </span>
                                                                    </td>
                                                                    <td className="p-3">
                                                                        <button 
                                                                            onClick={() => {
                                                                                setEditUserId(idx);
                                                                                setEditUsername(user.username);
                                                                                setEditPassword('');
                                                                                setEditUserRole(user.role);
                                                                            }} 
                                                                            className="text-blue-600 hover:text-blue-800 mr-3"
                                                                        >
                                                                            Edit
                                                                        </button>
                                                                        {user.role !== 'admin' && (
                                                                            <button onClick={() => handleDeleteUser(idx)} className="text-red-600 hover:text-red-800">
                                                                                Hapus
                                                                            </button>
                                                                        )}
                                                                    </td>
                                                                </>
                                                            )}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                                
                                {adminTab === 'pengaturan' && (
                                    <div className="text-center py-8 text-navy-600">
                                        <Icon name="Settings" className="w-12 h-12 mx-auto text-gold-400 mb-3" />
                                        <p className="font-medium">Halaman pengaturan sistem</p>
                                        <p className="text-sm text-navy-400 mt-2">Ganti password admin dan URL YouTube Live Streaming (Akses hanya untuk Admin)</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            // ========================================================
            // KOMPONEN HOME (Sederhana)
            // ========================================================
            const Home = () => (
                <div className="space-y-6">
                    <div className="bg-white rounded-[1.5rem] shadow-sm border border-navy-100/60 p-8 text-center">
                        <img src="./PisgahColor.png" alt="PISGAH-BISDAC" className="h-24 mx-auto mb-4" />
                        <h1 className="text-2xl font-black text-navy-900">PISGAH-BISDAC</h1>
                        <p className="text-navy-500 mt-2">Batam International Seventh-Day Adventist Church</p>
                        <div className="mt-6 grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="bg-navy-50 p-4 rounded-xl"><Icon name="Calendar" className="w-6 h-6 mx-auto text-gold-500" /><p className="text-xs mt-2 font-bold">Jadwal Ibadah</p></div>
                            <div className="bg-navy-50 p-4 rounded-xl"><Icon name="BookOpen" className="w-6 h-6 mx-auto text-gold-500" /><p className="text-xs mt-2 font-bold">Sekolah Sabat</p></div>
                            <div className="bg-navy-50 p-4 rounded-xl"><Icon name="Video" className="w-6 h-6 mx-auto text-gold-500" /><p className="text-xs mt-2 font-bold">Live Streaming</p></div>
                            <div className="bg-navy-50 p-4 rounded-xl"><Icon name="Gift" className="w-6 h-6 mx-auto text-gold-500" /><p className="text-xs mt-2 font-bold">Persembahan</p></div>
                        </div>
                    </div>
                </div>
            );

            // ========================================================
            // RENDER UTAMA
            // ========================================================
            const renderContent = () => {
                if (activeTab === 'home') return <Home />;
                if (activeTab === 'admin_dashboard') {
                    if (!isLoggedIn) return <div className="text-center py-12">Silakan login terlebih dahulu.</div>;
                    return <AdminDashboard userRole={userRole} users={users} setUsers={setUsers} />;
                }
                return (
                    <div className="bg-white rounded-[1.5rem] shadow-sm border border-navy-100/60 p-8 text-center">
                        <p className="text-navy-600">Halaman {activeTab} sedang dalam pengembangan.</p>
                    </div>
                );
            };

            if (isAppLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="w-12 h-12 border-4 border-navy-100 border-t-gold-500 rounded-full animate-spin mb-4"></div>
                        <p className="text-navy-500 font-bold">Loading...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-navy-50 flex flex-col">
                    <LoginModal isOpen={showLoginModal} onClose={() => setShowLoginModal(false)} onSuccess={handleLoginSuccess} />
                    
                    {/* Header */}
                    <header className="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-navy-100 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <img src="./PisgahColor.png" alt="Logo" className="h-8 w-auto" />
                                <span className="font-black text-navy-900 text-lg hidden sm:inline">PISGAH-BISDAC</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setActiveTab('home')} className="px-4 py-2 rounded-full font-bold text-navy-700 hover:bg-navy-100 transition">Home</button>
                                {isLoggedIn ? (
                                    <>
                                        <button onClick={() => setActiveTab('admin_dashboard')} className="px-4 py-2 rounded-full bg-navy-900 text-gold-400 font-bold hover:bg-navy-800 transition">Dashboard</button>
                                        <button onClick={handleLogout} className="px-4 py-2 rounded-full bg-red-50 text-red-600 font-bold hover:bg-red-100 transition">Logout</button>
                                    </>
                                ) : (
                                    <button onClick={() => setShowLoginModal(true)} className="px-4 py-2 rounded-full bg-gold-500 text-white font-bold hover:bg-gold-600 transition shadow-sm">Login</button>
                                )}
                            </div>
                        </div>
                    </header>
                    
                    {/* Main Content */}
                    <main className="flex-1 max-w-5xl mx-auto w-full p-4 md:p-6">
                        {renderContent()}
                    </main>
                    
                    {/* Footer */}
                    <footer className="text-center py-6 text-navy-500 text-xs border-t border-navy-100">
                        <p>Copyright &copy; by PISGAH BISDAC Team 2026</p>
                        <p>GOD BLESS US</p>
                    </footer>
                </div>
            );
        };

        // Render aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
